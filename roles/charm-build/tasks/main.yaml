- name: lxd apt packages are not present
  apt:
    name:
      - lxd
      - lxd-client
    state: absent
    purge: true
  become: true

- name: snapd is installed
  apt:
    name: snapd
  become: true

- name: nftables is installed
  apt:
    name: nftables
  become: true
  when: ansible_distribution_release in ('jammy', 'noble')

- name: lxd snap is installed
  ansible.builtin.command: snap install lxd --channel=latest/stable
  become: true
  register: lxd_snap_result
  changed_when: "'already installed' not in lxd_snap_result.stderr"
  failed_when: >
    lxd_snap_result.rc != 0 and
    'already installed' not in lxd_snap_result.stderr
  retries: 5
  delay: 15
  until: not lxd_snap_result.failed

- name: lxd is initialised
  command: lxd init --auto
  become: true

- name: allow packets from lxd bridge
  command: nft insert rule filter openstack-INPUT iif lxdbr0 accept
  become: true
  when: ansible_distribution_release in ('jammy', 'noble')

- name: current user is in lxd group
  user:
    name: "{{ ansible_user }}"
    groups: lxd
    append: true
  become: true

- name: reset ssh connection to apply permissions from new group
  meta: reset_connection

- name: charmcraft is installed
  ansible.builtin.command: snap install charmcraft --classic --channel={{ charmcraft_channel | default('latest/stable') }}
  become: true
  register: charmcraft_snap_result
  changed_when: "'already installed' not in charmcraft_snap_result.stderr"
  failed_when: >
    charmcraft_snap_result.rc != 0 and
    'already installed' not in charmcraft_snap_result.stderr
  retries: 5
  delay: 15
  until: not charmcraft_snap_result.failed

- name: Set legacy charm build path
  set_fact:
    charm_pathed: '{{ "storage/" + charm_build_name if is_storage else charm_build_name }}'
  when: charm_builds is not defined

- name: Set legacy charm build list
  set_fact:
    charm_builds:
      - name: "{{ charm_build_name }}"
        path: "{{ charm_pathed }}"
  when: charm_builds is not defined

- name: Detect files changed in this change
  command: "git diff --name-only origin/{{ zuul.branch }}...HEAD"
  args:
    chdir: "{{ zuul.project.src_dir }}"
  register: changed_files

- name: Determine whether ops-sunbeam or rebuild was touched
  set_fact:
    rebuild_all: >-
      {{
        changed_files.stdout_lines | select('match', '^ops-sunbeam/ops_sunbeam/') | list | length > 0
      }}

- name: Filter charm_builds to only modified charms
  set_fact:
    charm_builds: >-
      {%- set ns = namespace(modified=[]) -%}
      {%- for cb in charm_builds -%}
        {%- if changed_files.stdout_lines | select('match', '^charms/' ~ cb.path ~ '/') | list | length > 0 -%}
          {%- set ns.modified = ns.modified + [cb] -%}
        {%- endif -%}
      {%- endfor -%}
      {{ ns.modified }}
  when: not rebuild_all

- name: Show charms to be built
  debug:
    msg: "Building: {{ charm_builds | map(attribute='name') | list }}"

- name: charms are packed
  command:
    cmd: "{{ tox_executable }} -e build -- {{ item.path }}"
    chdir: "{{ zuul.project.src_dir }}"
  register: res
  retries: 3
  delay: 30
  until: >
    "Charm packed ok" in res.stdout
  failed_when: '"Failed instance creation" in res.stdout'
  loop: "{{ charm_builds }}"
  loop_control:
    label: "{{ item.path }}"

- name: Publish built charm as zuul artifact (check pipeline only)
  when: zuul.pipeline == 'check'
  block:
    - name: Reset charm artifact metadata
      set_fact:
        charm_artifacts: []

    - name: built charm is available in the zuul log root for auto artifact upload
      fetch:
        src: "{{ zuul.project.src_dir }}/charms/{{ item.path }}/{{ item.name }}.charm"
        dest: "{{ zuul.executor.log_root }}/"
        flat: true
      become: true
      loop: "{{ charm_builds }}"
      loop_control:
        label: "{{ item.path }}"

    - name: Build charm artifact metadata
      set_fact:
        charm_artifacts: "{{ charm_artifacts | default([]) + [artifact] }}"
      vars:
        artifact:
          name: charm
          url: "{{ item.name }}.charm"
          metadata:
            type: charm
            name: "{{ item.name }}"
      loop: "{{ charm_builds }}"
      loop_control:
        label: "{{ item.path }}"

    - name: Upload artifacts
      zuul_return:
        data:
          zuul:
            artifacts: "{{ charm_artifacts }}"
