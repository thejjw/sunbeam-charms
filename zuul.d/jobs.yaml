    description: Build a bin of Sunbeam charms
    run: playbooks/charm/build.yaml
    timeout: 7200
    nodeset: ubuntu-noble
    match-on-config-updates: false
    irrelevant-files:
      - ops-sunbeam/ops_sunbeam/test_.*\.py
