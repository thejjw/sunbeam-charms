- job:
    name: func-test-tempest
    description: Zaza tests for the tempest-k8s charm.
    timeout: 3600
    pre-run: playbooks/pre-run-func-test.yaml
    run: playbooks/zaza-func-test.yaml
    post-run: playbooks/collect-run-data.yaml
    dependencies:
      - name: charm-build-bin-core-identity
        soft: true
      - name: charm-build-bin-core-compute
        soft: true
      - name: charm-build-bin-core-ovn
        soft: true
    files:
      - ops-sunbeam/ops_sunbeam/
      - charms/tempest-k8s/
      - tests/local/zaza/sunbeam/charm_tests/tempest_k8s/
      - rebuild
    irrelevant-files:
      - ops-sunbeam/ops_sunbeam/test_.*\.py
    vars:
      charm_jobs:
        - charm-build-bin-core-identity
        - charm-build-bin-core-compute
        - charm-build-bin-core-ovn
      test_dir: tests/tempest
- job:
    name: func-test-identity
    description: |
      Zaza smoke test for the identity feature, which
      involves keystone and horizon.
    timeout: 3600
