- job:
    name: func-test-openstack-microovn
    description: |
      Zaza smoke test for all the k8s sunbeam charms with MicroOVN as the
      OVN provider. In this scenario MicroOVN manages the OVN control plane
      and OVS on machines via openstack-network-agents, replacing the
      ovn-central-k8s / ovn-relay-k8s stack. sunbeam-ovn-proxy bridges
      MicroOVN's ovsdb interface to the ovsdb-cms interface consumed by
      neutron, octavia, and the hypervisor.
    timeout: 7200
    pre-run: playbooks/pre-run-func-test.yaml
    run: playbooks/zaza-func-test.yaml
    post-run: playbooks/collect-run-data.yaml
    dependencies:
      - name: charm-build-bin-core-identity
