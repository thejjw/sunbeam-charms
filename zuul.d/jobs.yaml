      - charms/keystone-k8s/
      - charms/keystone-saml-k8s/
      - rebuild
    irrelevant-files:
      - ops-sunbeam/ops_sunbeam/test_.*\.py
    vars:
      charm_jobs:
        - charm-build-bin-core-identity
      test_dir: tests/identity
