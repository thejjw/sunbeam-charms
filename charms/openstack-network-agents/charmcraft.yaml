type: charm
name: openstack-network-agents
title: OpenStack Network Agents (subordinate)
summary: Subordinate charm to drive the openstack-network-agents snap
description: |
  Installs and configures the 'openstack-network-agents' snap, sets up the
  provider bridge/physnet mapping, and runs neutron-ovn-metadata-agent.
  Attach this charm to MicroOVN units to provide north/south traffic.

base: ubuntu@24.04
subordinate: true

platforms:
  amd64:
  arm64:

requires:
  juju-info:
    interface: juju-info
    scope: container

extra-bindings:
  data: null

config:
  options:
    snap-name:
      type: string
      default: openstack-network-agents
      description: Name of the snap to install.
    snap-channel:
      type: string
      default: latest/edge
      description: Snap channel to track.
    external-bridge-address:
      default: 0.0.0.0/0
      type: string
      description: |
        CIDR range for the provider bridge's IP address. This is only useful
        in local networking mode.
    debug:
      type: boolean
      default: false
    use-data-binding:
      default: false
      type: boolean
      description: |
        When true, resolve the data-plane IP from the 'data'
        extra-binding and pass it to the snap as network.ip-address.

actions:
  set-network-agents-local-settings:
    description: |
      Apply settings specific to this unit for provider networking.
    params:
      external-interface:
        type: string
        description: |
          (Deprecated) Physical NIC to add as a bridge port (e.g. enp6s0).
      bridge-name:
        type: string
        description: |
          (Deprecated) Provider bridge name.
      physnet-name:
        type: string
        description: |
          (Deprecated) OVN physnet label.
      enable-chassis-as-gw:
        type: boolean
        description: |
          If true, set ovn-cms-options=enable-chassis-as-gw so L3 gateway roles
          prefer scheduling here.
      bridge-mapping:
        type: string
        description: |
          Space separated list of bridge:physnet:iface mappings. (br-ex:physnet1:ens3 ...)
    additionalProperties: false
  list-nics:
    description: |
      List host NICS, and which one are candidates for use as external NIC.
    additionalProperties: false
  refresh-snap:
    description: |
      Refresh the snap to the latest available revision on the configured
      channel. The snap is held after installation to prevent automatic
      refreshes; use this action to apply updates explicitly.

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv
    build-packages:
      - git
