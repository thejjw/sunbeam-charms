type: charm
name: epa-orchestrator
title: Epa Orchestrator
summary: Deploy the epa-orchestrator snap.
description: |
  Configures the epa-orchestrator snap as a part of the openstack deployment.
assumes:
  - juju >= 3.1
base: ubuntu@24.04
subordinate: true
platforms:
  amd64:
  arm64:
config:
  options:
    snap-name:
      default: epa-orchestrator
      type: string
      description: The name of the snap to install.
    snap-channel:
      default: 2025.1/edge
      type: string
      description: The channel of the snap to install.
requires:
  sunbeam-machine:
    interface: sunbeam-machine
    scope: container
    limit: 1
  tracing:
    interface: tracing
    optional: true
    limit: 1

actions:
  refresh-snap:
    description: |
      Refresh the snap to the latest available revision on the configured
      channel. The snap is held after installation to prevent automatic
      refreshes; use this action to apply updates explicitly.

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv
    build-packages:
      - git
