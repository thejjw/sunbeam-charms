type: charm
name: sunbeam-ovn-proxy
title: Sunbeam OVN Proxy
summary: Relation proxy between ovsdb and ovsdb-cms.
description: |
  The goal of this charm is to act as a relation proxy between
  the ovsdb-cms relation and the ovsdb relation. This is needed
  because MicroOVN only provides OVSDB interface, while Sunbeam
  charms need more information that is provided by the ovsdb-cms
  relation.

base: ubuntu@24.04
platforms:
  amd64:
  arm64:
  s390x:

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv
    build-packages:
      - git
      - gcc
      - python3-dev
      # s390x: build cryptography (openssl-sys/Rust) from source
      - libssl-dev
      - pkg-config
      - rustc-1.82
      - cargo-1.82
requires:
  ovsdb:
    interface: ovsdb
    limit: 1
  tracing:
    interface: tracing
    optional: true
    limit: 1

provides:
  ovsdb-cms:
    interface: ovsdb-cms
