type: charm
title: Sunbeam Clusterd
name: sunbeam-clusterd
summary: A juju charm to run sunbeam clusterd
description: |
  Manage sunbeam clusterd deployment

base: ubuntu@26.04
build-base: ubuntu@devel
platforms:
  amd64:
  arm64:

config:
  options:
    snap-channel:
      default: 2025.1/edge
      type: string
    debug:
      default: false
      type: boolean

actions:
  get-credentials:
    description: |
      Return information necessary to connect to clusterd.
  refresh-snap:
    description: |
      Refresh the openstack snap to the latest available revision on the
      configured channel. The snap is held after installation to prevent
      automatic refreshes; use this action to apply updates explicitly.

requires:
  certificates:
    interface: tls-certificates
    optional: true
  tracing:
    interface: tracing
    optional: true
    limit: 1

peers:
  peers:
    interface: clusterd-peer

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv
    build-packages:
      - git
