type: charm
name: cinder-volume-ibmibmstorage
summary: OpenStack volume service - IBMStorage backend
description: |
  Cinder is the OpenStack project that provides volume management for
  instances.  This charm provides integration with IBMStorage storage backends.
assumes:
  - juju >= 3.3
links:
  source:
    - https://opendev.org/openstack/sunbeam-charms
  issues:
    - https://bugs.launchpad.net/sunbeam-charms

base: ubuntu@24.04
platforms:
  amd64:
  arm64:

subordinate: true

config:
  options:
    volume-backend-name:
      default: null
      description: |
        Name that Cinder will report for this backend.
      type: string
    backend-availability-zone:
      default: null
      description: |
        Availability zone to associate with this backend.
      type: string
    ds8k-devadd-unitadd-mapping:
      default: null
      description: |
        Mapping between IODevice address and unit address.
      type: string
    ds8k-ssid-prefix:
      default: FF
      description: |
        Set the first two digits of SSID.
      type: string
    lss-range-for-cg:
      default: null
      description: |
        Reserve LSSs for consistency group.
      type: string
    ds8k-host-type:
      default: auto
      description: |
        <expr>
      type: string
    proxy:
      default: cinder.volume.drivers.ibm.ibm_storage.proxy.IBMStorageProxy
      description: |
        Proxy driver that connects to the IBM Storage Array
      type: string
    connection-type:
      default: iscsi
      description: |
        Connection type to the IBM Storage Array
      type: string
      enum:
        - fibre_channel
        - iscsi
    chap:
      default: disabled
      description: |
        CHAP authentication mode, effective only for iscsi (disabled|enabled)
      type: string
      enum:
        - disabled
        - enabled
    management-ips:
      default: null
      description: |
        List of Management IP addresses (separated by commas)
      type: string
    san-thin-provision:
      default: true
      description: |
        Use thin provisioning for SAN volumes?
      type: boolean
    san-ip:
      description: |
        IP address of SAN controller
      type: string
    san-login:
      description: |
        Username for SAN controller
      type: secret
    san-password:
      description: |
        Password for SAN controller
      type: secret
    use-multipath-for-image-xfer:
      default: true
      description: |
        Enable multipathing for image transfer operations.
      type: boolean

requires:
  cinder-volume:
    interface: cinder-volume
    scope: container
    limit: 1
  tracing:
    interface: tracing
    optional: true
    limit: 1

parts:
  update-certificates:
    plugin: nil
    override-build: |
      apt update
      apt install -y ca-certificates
      update-ca-certificates
  charm:
    after:
      - update-certificates
    build-packages:
      - git
      - libffi-dev
      - libssl-dev
      - pkg-config
      - rustc-1.80
      - cargo-1.80
    charm-binary-python-packages:
      - cryptography
      - jsonschema
      - pydantic
      - jinja2
    build-snaps: [astral-uv]
    override-build: |
      uv export --frozen --no-hashes --format=requirements-txt -o requirements.txt
      craftctl default
    charm-requirements: [requirements.txt]
