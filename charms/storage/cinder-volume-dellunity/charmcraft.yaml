type: charm
name: cinder-volume-dellunity
summary: OpenStack volume service - Dell Unity backend
description: |
  Cinder is the OpenStack project that provides volume management for
  instances.  This charm provides integration with Dell Unity storage backends.
assumes:
  - juju >= 3.3
links:
  source:
    - https://opendev.org/openstack/sunbeam-charms
  issues:
    - https://bugs.launchpad.net/sunbeam-charms

base: ubuntu@24.04
platforms:
  amd64:
  arm64:

subordinate: true

config:
  options:
    volume-backend-name:
      default: null
      description: |
        Name that Cinder will report for this backend.
      type: string
    backend-availability-zone:
      default: null
      description: |
        Availability zone to associate with this backend.
      type: string
    protocol:
      description: |
        Protocol selector: iscsi, fc.
      type: string
    unity-storage-pool-names:
      default: null
      description: |
        A comma-separated list of storage pool names to be used.
      type: string
    unity-io-ports:
      default: null
      description: |
        A comma-separated list of iSCSI or FC ports to be used. Each port can be Unix-style glob expressions.
      type: string
    remove-empty-host:
      default: false
      description: |
        To remove the host from Unity when the last LUN is detached from it. By default, it is False.
      type: boolean
    san-thin-provision:
      default: true
      description: |
        Use thin provisioning for SAN volumes?
      type: boolean
    san-ip:
      description: |
        IP address of SAN controller
      type: string
    san-login:
      type: secret
      description: |
        Username for SAN controller
    san-password:
      type: secret
      description: |
        Password for SAN controller
    use-multipath-for-image-xfer:
      default: true
      description: |
        Enable multipathing for image transfer operations.
      type: boolean

requires:
  cinder-volume:
    interface: cinder-volume
    scope: container
    limit: 1
  tracing:
    interface: tracing
    optional: true
    limit: 1

parts:
  update-certificates:
    plugin: nil
    override-build: |
      apt update
      apt install -y ca-certificates
      update-ca-certificates
  charm:
    after:
      - update-certificates
    build-packages:
      - git
      - libffi-dev
      - libssl-dev
      - pkg-config
      - rustc-1.80
      - cargo-1.80
    charm-binary-python-packages:
      - cryptography
      - jsonschema
      - pydantic
      - jinja2
    build-snaps: [astral-uv]
    override-build: |
      uv export --frozen --no-hashes --format=requirements-txt -o requirements.txt
      craftctl default
    charm-requirements: [requirements.txt]
