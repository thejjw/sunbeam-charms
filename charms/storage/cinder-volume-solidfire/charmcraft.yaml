type: charm
name: cinder-volume-solidfire
summary: OpenStack volume service - NetApp SolidFire backend
description: |
  Cinder is the OpenStack project that provides volume management for
  instances.  This charm provides integration with NetApp SolidFire storage backends.
assumes:
  - juju >= 3.3
links:
  source:
    - https://opendev.org/openstack/sunbeam-charms
  issues:
    - https://bugs.launchpad.net/sunbeam-charms

base: ubuntu@26.04
build-base: ubuntu@devel
platforms:
  amd64:
  arm64:

subordinate: true

config:
  options:
    volume-backend-name:
      default: null
      description: |
        Name that Cinder will report for this backend.
      type: string
    backend-availability-zone:
      default: null
      description: |
        Availability zone to associate with this backend.
      type: string
    san-ip:
      description: |
        IP address of SAN controller
      type: string
    driver-ssl-cert:
      type: string
      default: null
      description: |
        PEM-encoded SSL certificate to use for HTTPS connections to the
        storage array. If unset, SSL verification is not performed.
    san-login:
      description: |
        Username for SAN controller
      type: secret
    san-password:
      description: |
        Password for SAN controller
      type: secret
    sf-emulate-512:
      default: true
      description: |
        Set 512 byte emulation on volume creation;
      type: boolean
    sf-allow-tenant-qos:
      default: false
      description: |
        Allow tenants to specify QOS on create
      type: boolean
    sf-account-prefix:
      default: null
      description: |
        Create SolidFire accounts with this prefix.
      type: string
    sf-volume-prefix:
      default: UUID-
      description: |
        Create SolidFire volumes with this prefix.
      type: string
    sf-svip:
      default: null
      description: |
        Overrides default cluster SVIP with the one specified.
      type: string
    sf-api-port:
      default: 443
      description: |
        SolidFire API port.
      type: int
    sf-enable-vag:
      default: false
      description: |
        Utilize volume access groups on a per-tenant basis.
      type: boolean
    sf-provisioning-calc:
      default: maxProvisionedSpace
      description: |
        Change how SolidFire reports used space and provisioning calculations.
      type: string
    sf-cluster-pairing-timeout:
      default: 60
      description: |
        Sets time in seconds to wait for clusters to complete pairing.
      type: int
    sf-volume-pairing-timeout:
      default: 3600
      description: |
        Sets time in seconds to wait for a migrating volume to complete pairing and sync.
      type: int
    sf-api-request-timeout:
      default: 30
      description: |
        Sets time in seconds to wait for an api request to complete.
      type: int
    sf-volume-clone-timeout:
      default: 600
      description: |
        Sets time in seconds to wait for a clone of a volume or snapshot to complete.
      type: int
    sf-volume-create-timeout:
      default: 60
      description: |
        Sets time in seconds to wait for a create volume operation to complete.
      type: int
    san-thin-provision:
      default: true
      description: |
        Use thin provisioning for SAN volumes?
      type: boolean
    use-multipath-for-image-xfer:
      default: true
      description: |
        Enable multipathing for image transfer operations.
      type: boolean

requires:
  cinder-volume:
    interface: cinder-volume
    scope: container
    limit: 1
  tracing:
    interface: tracing
    optional: true
    limit: 1

parts:
  update-certificates:
    plugin: nil
    override-build: |
      apt update
      apt install -y ca-certificates
      update-ca-certificates
  charm:
    after:
      - update-certificates
    build-packages:
      - git
      - libffi-dev
      - libssl-dev
      - pkg-config
      - rustc-1.80
      - cargo-1.80
    charm-binary-python-packages:
      - cryptography
      - jsonschema
      - pydantic
      - jinja2
    build-snaps: [astral-uv]
    override-build: |
      uv export --frozen --no-hashes --format=requirements-txt -o requirements.txt
      craftctl default
    charm-requirements: [requirements.txt]
