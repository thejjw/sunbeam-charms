type: charm
name: cinder-volume-zadara
summary: OpenStack volume service - ZadaraVPSA iSCSI backend
description: |
  Cinder is the OpenStack project that provides volume management for
  instances.  This charm provides integration with ZadaraVPSA iSCSI storage backends.
assumes:
  - juju >= 3.3
links:
  source:
    - https://opendev.org/openstack/sunbeam-charms
  issues:
    - https://bugs.launchpad.net/sunbeam-charms

base: ubuntu@26.04
build-base: ubuntu@devel
platforms:
  amd64:
  arm64:

subordinate: true

config:
  options:
    volume-backend-name:
      default: null
      description: |
        Name that Cinder will report for this backend.
      type: string
    backend-availability-zone:
      default: null
      description: |
        Availability zone to associate with this backend.
      type: string
    zadara-vpsa-host:
      default: null
      description: |
        VPSA - Management Host name or IP address
      type: string
    zadara-vpsa-port:
      default: null
      description: |
        VPSA - Port number
      type: int
    zadara-vpsa-use-ssl:
      default: false
      description: |
        VPSA - Use SSL connection
      type: boolean
    zadara-ssl-cert-verify:
      default: true
      description: |
        If set to True the http client will validate the SSL certificate of the VPSA endpoint.
      type: boolean
    zadara-access-key:
      description: |
        VPSA access key
      type: secret
    zadara-vpsa-poolname:
      default: null
      description: |
        VPSA - Storage Pool assigned for volumes
      type: string
    zadara-vol-encrypt:
      default: false
      description: |
        VPSA - Default encryption policy for volumes.
      type: boolean
    zadara-gen3-vol-dedupe:
      default: false
      description: |
        VPSA - Enable deduplication for volumes.
      type: boolean
    zadara-gen3-vol-compress:
      default: false
      description: |
        VPSA - Enable compression for volumes.
      type: boolean
    zadara-default-snap-policy:
      default: false
      description: |
        VPSA - Attach snapshot policy for volumes.
      type: boolean
    zadara-use-iser:
      default: true
      description: |
        VPSA - Use ISER instead of iSCSI
      type: boolean
    zadara-vol-name-template:
      default: OS_%s
      description: |
        VPSA - Default template for VPSA volume names
      type: string

requires:
  cinder-volume:
    interface: cinder-volume
    scope: container
    limit: 1
  tracing:
    interface: tracing
    optional: true
    limit: 1

parts:
  update-certificates:
    plugin: nil
    override-build: |
      apt update
      apt install -y ca-certificates
      update-ca-certificates
  charm:
    after:
      - update-certificates
    build-packages:
      - git
      - libffi-dev
      - libssl-dev
      - pkg-config
      - rustc-1.80
      - cargo-1.80
    charm-binary-python-packages:
      - cryptography
      - jsonschema
      - pydantic
      - jinja2
    build-snaps: [astral-uv]
    override-build: |
      uv export --frozen --no-hashes --format=requirements-txt -o requirements.txt
      craftctl default
    charm-requirements: [requirements.txt]
