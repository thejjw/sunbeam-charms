type: charm
name: cinder-volume-fujitsueternusdx
summary: OpenStack volume service - FJDX FC backend
description: |
  Cinder is the OpenStack project that provides volume management for
  instances.  This charm provides integration with FJDX FC storage backends.
assumes:
  - juju >= 3.3
links:
  source:
    - https://opendev.org/openstack/sunbeam-charms
  issues:
    - https://bugs.launchpad.net/sunbeam-charms

base: ubuntu@24.04
platforms:
  amd64:
  arm64:

subordinate: true

config:
  options:
    volume-backend-name:
      default: null
      description: |
        Name that Cinder will report for this backend.
      type: string
    backend-availability-zone:
      default: null
      description: |
        Availability zone to associate with this backend.
      type: string
    san-ip:
      description: |
        Storage array management IP address or hostname.
      type: string
    protocol:
      description: |
        Protocol selector: fc, iscsi.
      type: string
    cinder-eternus-config-file:
      default: /etc/cinder/cinder_fujitsu_eternus_dx.xml
      description: |
        Config file for cinder eternus_dx volume driver.
      type: string
    fujitsu-passwordless:
      description: |
        Use SSH key to connect to storage.
      type: secret
    fujitsu-private-key-path:
      default: $state_path/eternus
      description: |
        Filename of private key for ETERNUS CLI. This option must be set when the fujitsu_passwordless is True.
      type: string
    fujitsu-use-cli-copy:
      default: false
      description: |
        If True use CLI command to create snapshot.
      type: boolean

requires:
  cinder-volume:
    interface: cinder-volume
    scope: container
    limit: 1
  tracing:
    interface: tracing
    optional: true
    limit: 1

parts:
  update-certificates:
    plugin: nil
    override-build: |
      apt update
      apt install -y ca-certificates
      update-ca-certificates
  charm:
    after:
      - update-certificates
    build-packages:
      - git
      - libffi-dev
      - libssl-dev
      - pkg-config
      - rustc-1.80
      - cargo-1.80
    charm-binary-python-packages:
      - cryptography
      - jsonschema
      - pydantic
      - jinja2
    build-snaps: [astral-uv]
    override-build: |
      uv export --frozen --no-hashes --format=requirements-txt -o requirements.txt
      craftctl default
    charm-requirements: [requirements.txt]
