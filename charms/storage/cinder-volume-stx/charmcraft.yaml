type: charm
name: cinder-volume-stx
summary: OpenStack volume service - Stx backend
description: |
  Cinder is the OpenStack project that provides volume management for
  instances.  This charm provides integration with Stx storage backends.
assumes:
  - juju >= 3.3
links:
  source:
    - https://opendev.org/openstack/sunbeam-charms
  issues:
    - https://bugs.launchpad.net/sunbeam-charms

base: ubuntu@24.04
platforms:
  amd64:
  arm64:

subordinate: true

config:
  options:
    volume-backend-name:
      default: null
      description: |
        Name that Cinder will report for this backend.
      type: string
    backend-availability-zone:
      default: null
      description: |
        Availability zone to associate with this backend.
      type: string
    driver-ssl-cert:
      default: null
      description: |
        PEM-encoded SSL certificate for HTTPS connections to the storage array.
      type: string
    san-ip:
      description: |
        Storage array management IP address or hostname.
      type: string
    seagate-pool-name:
      default: A
      description: |
        Pool or vdisk name to use for volume creation.
      type: string
    seagate-pool-type:
      default: virtual
      description: |
        linear (for vdisk) or virtual (for virtual pool).
      type: string
    seagate-iscsi-ips:
      default: null
      description: |
        List of comma-separated target iSCSI IP addresses.
      type: string

requires:
  cinder-volume:
    interface: cinder-volume
    scope: container
    limit: 1
  tracing:
    interface: tracing
    optional: true
    limit: 1

parts:
  update-certificates:
    plugin: nil
    override-build: |
      apt update
      apt install -y ca-certificates
      update-ca-certificates
  charm:
    after:
      - update-certificates
    build-packages:
      - git
      - libffi-dev
      - libssl-dev
      - pkg-config
      - rustc-1.80
      - cargo-1.80
    charm-binary-python-packages:
      - cryptography
      - jsonschema
      - pydantic
      - jinja2
    build-snaps: [astral-uv]
    override-build: |
      uv export --frozen --no-hashes --format=requirements-txt -o requirements.txt
      craftctl default
    charm-requirements: [requirements.txt]
