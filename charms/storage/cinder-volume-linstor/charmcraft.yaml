type: charm
name: cinder-volume-linstor
summary: OpenStack volume service - LinstorIscsi backend
description: |
  Cinder is the OpenStack project that provides volume management for
  instances.  This charm provides integration with LinstorIscsi storage backends.
assumes:
  - juju >= 3.3
links:
  source:
    - https://opendev.org/openstack/sunbeam-charms
  issues:
    - https://bugs.launchpad.net/sunbeam-charms

base: ubuntu@26.04
build-base: ubuntu@devel
platforms:
  amd64:
  arm64:

subordinate: true

config:
  options:
    volume-backend-name:
      default: null
      description: |
        Name that Cinder will report for this backend.
      type: string
    backend-availability-zone:
      default: null
      description: |
        Availability zone to associate with this backend.
      type: string
    san-ip:
      description: |
        Storage array management IP address or hostname.
      type: string
    linstor-default-volume-group-name:
      default: drbd-vg
      description: |
        Default Volume Group name for LINSTOR. Not Cinder Volume.
      type: string
    linstor-default-uri:
      default: linstor://localhost
      description: |
        Default storage URI for LINSTOR.
      type: string
    linstor-default-storage-pool-name:
      default: DfltStorPool
      description: |
        Default Storage Pool name for LINSTOR.
      type: string
    linstor-volume-downsize-factor:
      default: "4096"
      description: |
        Default volume downscale size in KiB = 4 MiB.
      type: string
    linstor-default-blocksize:
      default: 4096
      description: |
        Default Block size for Image restoration. When using iSCSI transport, this option specifies the block size.
      type: int
    linstor-autoplace-count:
      default: 0
      description: |
        Autoplace replication count on volume deployment. 0 = Full cluster replication without autoplace, 1 = Single node deployment without replication, 2 or greater = Replicated deployment with autoplace.
      type: int
    linstor-controller-diskless:
      default: true
      description: |
        True means Cinder node is a diskless LINSTOR node.
      type: boolean

requires:
  cinder-volume:
    interface: cinder-volume
    scope: container
    limit: 1
  tracing:
    interface: tracing
    optional: true
    limit: 1

parts:
  update-certificates:
    plugin: nil
    override-build: |
      apt update
      apt install -y ca-certificates
      update-ca-certificates
  charm:
    after:
      - update-certificates
    build-packages:
      - git
      - libffi-dev
      - libssl-dev
      - pkg-config
      - rustc-1.80
      - cargo-1.80
    charm-binary-python-packages:
      - cryptography
      - jsonschema
      - pydantic
      - jinja2
    build-snaps: [astral-uv]
    override-build: |
      uv export --frozen --no-hashes --format=requirements-txt -o requirements.txt
      craftctl default
    charm-requirements: [requirements.txt]
