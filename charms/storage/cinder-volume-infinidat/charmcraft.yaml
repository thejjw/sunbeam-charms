type: charm
name: cinder-volume-infinidat
summary: OpenStack volume service - INFINIDAT InfiniBox backend
description: |
  Cinder is the OpenStack project that provides volume management for
  instances. This charm provides integration with INFINIDAT InfiniBox
  storage backends.
assumes:
  - juju >= 3.3
links:
  source:
    - https://opendev.org/openstack/sunbeam-charms
  issues:
    - https://bugs.launchpad.net/sunbeam-charms

base: ubuntu@24.04
platforms:
  amd64:
  arm64:

subordinate: true

config:
  options:
    volume-backend-name:
      default: null
      description: |
        Name that Cinder will report for this backend. If unset the Juju
        application name is used.
      type: string
    backend-availability-zone:
      default: null
      description: |
        Availability zone to associate with this backend.
      type: string
    driver-ssl-cert:
      default: null
      description: |
        PEM-encoded SSL certificate to use for HTTPS connections to the
        InfiniBox management interface. If unset, SSL verification is
        not performed.
      type: string
    driver-use-ssl:
      default: false
      description: |
        Use HTTPS for connections to the InfiniBox management interface.
      type: boolean
    san-ip:
      description: |
        IP address or hostname of the InfiniBox management interface.
      type: string
    san-login:
      description: |
        Username for the InfiniBox management interface.
        Must contain the key `san-login`.
      type: secret
    san-password:
      description: |
        Password for the InfiniBox management interface.
        Must contain the key `san-password`.
      type: secret
    infinidat-pool-name:
      description: |
        Name of the pool on the InfiniBox from which volumes are allocated.
      type: string
    protocol:
      default: iscsi
      description: |
        Protocol for transferring data between host and storage back-end.
        Valid values are 'iscsi' or 'fc'.
      enum: [fc, iscsi]
      type: string
    infinidat-iscsi-netspaces:
      default: null
      description: |
        List of names of network spaces to use for iSCSI connectivity.
        Required if protocol is iscsi. Multiple values can be comma separated.
      type: string
    use-chap-auth:
      default: true
      description: |
        Whether to use CHAP authentication for iSCSI connections.
      type: boolean
    chap-username:
      default: null
      description: |
        CHAP username. If not specified, one is auto-generated by the driver.
        Must contain the key `chap-username`.
      type: secret
    chap-password:
      default: null
      description: |
        CHAP password. If not specified, one is auto-generated by the driver.
        Must contain the key `chap-password`.
      type: secret
    infinidat-use-compression:
      default: null
      description: |
        Specifies whether to enable (true) or disable (false) compression for
        newly created volumes. Leave this unset to inherit from the parent pool.
      type: boolean
    max-over-subscription-ratio:
      default: null
      description: |
        Maximum oversubscription ratio for thin provisioning. If unset,
        the Cinder default is used.
      type: float
    san-thin-provision:
      default: true
      description: |
        Use thin provisioning for SAN volumes?
      type: boolean
    use-multipath-for-image-xfer:
      default: true
      description: |
        Enable multipathing for image transfer operations.
      type: boolean

requires:
  cinder-volume:
    interface: cinder-volume
    scope: container
    limit: 1
  tracing:
    interface: tracing
    optional: true
    limit: 1

parts:
  update-certificates:
    plugin: nil
    override-build: |
      apt update
      apt install -y ca-certificates
      update-ca-certificates
  charm:
    after:
      - update-certificates
    build-packages:
      - git
      - libffi-dev
      - libssl-dev
      - pkg-config
      - rustc-1.80
      - cargo-1.80
    charm-binary-python-packages:
      - cryptography
      - jsonschema
      - pydantic
      - jinja2
    build-snaps: [astral-uv]
    override-build: |
      uv export --frozen --no-hashes --format=requirements-txt -o requirements.txt
      craftctl default
    charm-requirements: [requirements.txt]
