type: charm
name: cinder-volume-dellpowerflex
summary: OpenStack volume service - Dell PowerFlex backend
description: |
  Cinder is the OpenStack project that provides volume management for
  instances.  This charm provides integration with Dell PowerFlex storage backends.
assumes:
  - juju >= 3.3
links:
  source:
    - https://opendev.org/openstack/sunbeam-charms
  issues:
    - https://bugs.launchpad.net/sunbeam-charms

base: ubuntu@24.04
platforms:
  amd64:

subordinate: true

config:
  options:
    volume-backend-name:
      default: null
      description: |
        Name that Cinder will report for this backend.
      type: string
    backend-availability-zone:
      default: null
      description: |
        Availability zone to associate with this backend.
      type: string
    san-ip:
      description: |
        Dell PowerFlex Manager IP
      type: string
    driver-ssl-cert:
      default: null
      description: |
        PEM-encoded SSL certificate to use for HTTPS connections to the
        storage array. If unset, SSL verification is not performed
      type: string
    san-login:
      description: |
        Dell PowerFlex Manager username.
      type: secret
    san-password:
      description: |
        Password for Dell PowerFlex Manager user.
      type: secret
    protocol:
      default: scaleio
      description: |
        Dell PowerFlex protocol selector, determines driver classe to use:
        scaleio - PowerFlexDriver, NVMe-TCP - PowerFlexNVMeDriver
      type: string
    powerflex-storage-pools:
      default: PD1:SP1
      description: |
        Colon separated Protection Domain and Storage Pool use for storage
        allocation. Can be configured to use multiple combination of
        Protection Domain and Storage Pool, and separate items by a comma.
      type: string
    use-multipath-for-image-xfer:
      default: true
      description: |
        Enable multipathing for image transfer operations.
      type: boolean
    powerflex-max-over-subscription-ratio:
      default: 10.0
      description: |
        Maximum oversubscription ratio allowed.
      type: float
    powerflex-rest-server-port:
      default: 443
      description: |
        Secured port to use when connecting to PowerFlex Manager.
      type: int
    powerflex-round-volume-capacity:
      default: true
      description: |
        Round volume sizes up to 8GB boundaries. PowerFlex OS requires
        volumes to be sized in multiples of 8GB. If set to False, volume
        creation will fail for volumes not sized properly.
      type: boolean
    powerflex-allow-non-padded-volumes:
      default: false
      description: |
        Allow volumes to be created in Storage Pools when zero padding is
        disabled. This option should not be enabled if multiple tenants use
        volumes from a shared Storage Pool.
      type: boolean
    powerflex-allow-migration-during-rebuild:
      default: false
      description: |
        Allow volume migration during rebuild operation.
      type: boolean
    powerflex-max-image-cache-vtree-size:
      default: 0
      description: |
        Maximum size of the vTree associated with an entry in the image volume cache.
      type: int
    rest-api-connect-timeout:
      default: 30
      description: |
        Connection timeout value (in seconds) for REST calls
      type: int
    rest-api-read-timeout:
      default: 30
      description: |
        Read timeout value (in seconds) for REST calls.
      type: int
    replication-device:
      description: |
          Specific replication configuration settings. Must be set under
          the form of
          backend_id:powerflex_repl,
          san_ip: <Replication system San ip>,
          san_login: <Replication system San username>,
          san_password: <Replication system San password>
      type: string

requires:
  cinder-volume:
    interface: cinder-volume
    scope: container
    limit: 1
  tracing:
    interface: tracing
    optional: true
    limit: 1

parts:
  update-certificates:
    plugin: nil
    override-build: |
      apt update
      apt install -y ca-certificates
      update-ca-certificates
  charm:
    after:
      - update-certificates
    build-packages:
      - git
      - libffi-dev
      - libssl-dev
      - pkg-config
      - rustc-1.80
      - cargo-1.80
    charm-binary-python-packages:
      - cryptography
      - jsonschema
      - pydantic
      - jinja2
    build-snaps: [astral-uv]
    override-build: |
      uv export --frozen --no-hashes --format=requirements-txt -o requirements.txt
      craftctl default
    charm-requirements: [requirements.txt]
