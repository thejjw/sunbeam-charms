type: charm
name: cinder-volume-opene
summary: OpenStack volume service - Jovian iSCSI backend
description: |
  Cinder is the OpenStack project that provides volume management for
  instances.  This charm provides integration with Jovian iSCSI storage backends.
assumes:
  - juju >= 3.3
links:
  source:
    - https://opendev.org/openstack/sunbeam-charms
  issues:
    - https://bugs.launchpad.net/sunbeam-charms

base: ubuntu@24.04
platforms:
  amd64:

subordinate: true

config:
  options:
    volume-backend-name:
      default: null
      description: |
        Name that Cinder will report for this backend.
      type: string
    backend-availability-zone:
      default: null
      description: |
        Availability zone to associate with this backend.
      type: string
    san-ip:
      description: |
        Storage array management IP address or hostname.
      type: string
    san-hosts:
      default: null
      description: |
        IP address of Open-E JovianDSS SA
      type: string
    jovian-recovery-delay:
      default: 60
      description: |
        Time before HA cluster failure.
      type: int
    jovian-ignore-tpath:
      default: null
      description: |
        List of multipath ip addresses to ignore.
      type: string
    chap-password-len:
      description: |
        Length of the random string for CHAP password.
      type: secret
    jovian-pool:
      default: Pool-0
      description: |
        JovianDSS pool that holds all cinder volumes
      type: string
    jovian-block-size:
      default: 64K
      description: |
        Block size for new volume
      type: string

requires:
  cinder-volume:
    interface: cinder-volume
    scope: container
    limit: 1
  tracing:
    interface: tracing
    optional: true
    limit: 1

parts:
  update-certificates:
    plugin: nil
    override-build: |
      apt update
      apt install -y ca-certificates
      update-ca-certificates
  charm:
    after:
      - update-certificates
    build-packages:
      - git
      - libffi-dev
      - libssl-dev
      - pkg-config
      - rustc-1.80
      - cargo-1.80
    charm-binary-python-packages:
      - cryptography
      - jsonschema
      - pydantic
      - jinja2
    build-snaps: [astral-uv]
    override-build: |
      uv export --frozen --no-hashes --format=requirements-txt -o requirements.txt
      craftctl default
    charm-requirements: [requirements.txt]
